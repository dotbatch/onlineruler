<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 931 420" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="cal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6a623"/><stop offset="1" stop-color="#e8890f"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="931" height="420" fill="#0f1530"/>

  <!-- top ruler strip ticks (0..9 inches) -->
  <g stroke="#f6a623">
    <!-- minor + major ticks generated evenly across width; majors at each inch -->
    <g stroke-width="1" opacity="0.85">
      <!-- many minor ticks -->
      <g>
        <line x1="48" y1="6" x2="48" y2="22"/><line x1="58" y1="14" x2="58" y2="22"/><line x1="68" y1="14" x2="68" y2="22"/><line x1="78" y1="10" x2="78" y2="22"/><line x1="88" y1="14" x2="88" y2="22"/><line x1="98" y1="14" x2="98" y2="22"/>
      </g>
    </g>
  </g>
  <!-- inch numbers across top -->
  <g fill="#f6a623" font-size="14" font-weight="700">
    <text x="44" y="40">0</text><text x="142" y="40">1</text><text x="240" y="40">2</text><text x="338" y="40">3</text><text x="436" y="40">4</text><text x="534" y="40">5</text><text x="632" y="40">6</text><text x="730" y="40">7</text><text x="828" y="40">8</text><text x="912" y="40">9</text>
    <text x="20" y="18" font-size="13">in</text>
  </g>
  <!-- top major tick lines at each inch -->
  <g stroke="#f6a623" stroke-width="2">
    <line x1="48" y1="4" x2="48" y2="26"/><line x1="146" y1="4" x2="146" y2="26"/><line x1="244" y1="4" x2="244" y2="26"/><line x1="342" y1="4" x2="342" y2="26"/><line x1="440" y1="4" x2="440" y2="26"/><line x1="538" y1="4" x2="538" y2="26"/><line x1="636" y1="4" x2="636" y2="26"/><line x1="734" y1="4" x2="734" y2="26"/><line x1="832" y1="4" x2="832" y2="26"/><line x1="916" y1="4" x2="916" y2="26"/>
  </g>
  <!-- minor ticks fill between majors -->
  <g stroke="#f6a623" stroke-width="1" opacity="0.7">
    <g>
      <line x1="68" y1="10" x2="68" y2="26"/><line x1="97" y1="14" x2="97" y2="26"/><line x1="117" y1="14" x2="117" y2="26"/>
      <line x1="166" y1="10" x2="166" y2="26"/><line x1="195" y1="14" x2="195" y2="26"/><line x1="215" y1="14" x2="215" y2="26"/>
      <line x1="264" y1="10" x2="264" y2="26"/><line x1="293" y1="14" x2="293" y2="26"/><line x1="313" y1="14" x2="313" y2="26"/>
      <line x1="362" y1="10" x2="362" y2="26"/><line x1="391" y1="14" x2="391" y2="26"/><line x1="411" y1="14" x2="411" y2="26"/>
      <line x1="460" y1="10" x2="460" y2="26"/><line x1="489" y1="14" x2="489" y2="26"/><line x1="509" y1="14" x2="509" y2="26"/>
      <line x1="558" y1="10" x2="558" y2="26"/><line x1="587" y1="14" x2="587" y2="26"/><line x1="607" y1="14" x2="607" y2="26"/>
      <line x1="656" y1="10" x2="656" y2="26"/><line x1="685" y1="14" x2="685" y2="26"/><line x1="705" y1="14" x2="705" y2="26"/>
      <line x1="754" y1="10" x2="754" y2="26"/><line x1="783" y1="14" x2="783" y2="26"/><line x1="803" y1="14" x2="803" y2="26"/>
      <line x1="852" y1="10" x2="852" y2="26"/><line x1="881" y1="14" x2="881" y2="26"/><line x1="901" y1="14" x2="901" y2="26"/>
    </g>
  </g>

  <!-- left ruler numbers 0..3 -->
  <g fill="#f6a623" font-size="13" font-weight="700">
    <text x="8" y="52">0</text><text x="8" y="150">1</text><text x="8" y="248">2</text><text x="8" y="340">3</text>
  </g>
  <g stroke="#f6a623" stroke-width="2">
    <line x1="4" y1="46" x2="26" y2="46"/><line x1="4" y1="144" x2="26" y2="144"/><line x1="4" y1="242" x2="26" y2="242"/><line x1="4" y1="334" x2="26" y2="334"/>
  </g>
  <g stroke="#f6a623" stroke-width="1" opacity="0.7">
    <line x1="10" y1="66" x2="26" y2="66"/><line x1="14" y1="95" x2="26" y2="95"/><line x1="14" y1="115" x2="26" y2="115"/>
    <line x1="10" y1="164" x2="26" y2="164"/><line x1="14" y1="193" x2="26" y2="193"/><line x1="14" y1="213" x2="26" y2="213"/>
    <line x1="10" y1="262" x2="26" y2="262"/><line x1="14" y1="291" x2="26" y2="291"/><line x1="14" y1="311" x2="26" y2="311"/>
  </g>

  <!-- measuring block: 0..3.02in wide (x 48->344), 0..2.72in tall (y 46->312) -->
  <rect x="48" y="46" width="296" height="266" fill="#f6a623" fill-opacity="0.92" stroke="#f6a623" stroke-width="2"/>
  <!-- horizontal readout -->
  <text x="196" y="290" text-anchor="middle" fill="#1a1300" font-size="26" font-weight="800">3.02 in</text>
  <!-- vertical readout -->
  <text x="332" y="120" text-anchor="middle" fill="#1a1300" font-size="26" font-weight="800" transform="rotate(90 332 120)">2.72 in</text>
  <!-- handles -->
  <rect x="326" y="170" width="16" height="34" rx="8" fill="#1a1300" stroke="#fff" stroke-width="3"/>
  <rect x="180" y="300" width="34" height="16" rx="8" fill="#1a1300" stroke="#fff" stroke-width="3"/>
  <circle cx="344" cy="312" r="11" fill="#1a1300" stroke="#fff" stroke-width="3"/>

  <!-- size pill bottom-center -->
  <rect x="378" y="372" width="176" height="34" rx="17" fill="#0f1530" fill-opacity="0.85" stroke="#2a335e"/>
  <text x="466" y="394" text-anchor="middle" font-size="14" font-weight="700" fill="#e7ecff">W <tspan fill="#f6a623">3.02 in</tspan>  ×  H <tspan fill="#f6a623">2.72 in</tspan></text>

  <!-- toolbar bottom-right -->
  <rect x="636" y="368" width="278" height="42" rx="14" fill="#0f1530" fill-opacity="0.8" stroke="#2a335e"/>
  <text x="656" y="394" font-size="18" fill="#8a93b8">⠿</text>
  <!-- unit toggle -->
  <rect x="676" y="376" width="76" height="26" rx="9" fill="#161e40" stroke="#2a335e"/>
  <text x="690" y="394" font-size="13" font-weight="700" fill="#8a93b8">cm</text>
  <rect x="718" y="378" width="32" height="22" rx="7" fill="rgba(246,166,35,0.16)" stroke="#f6a623"/>
  <text x="725" y="394" font-size="13" font-weight="700" fill="#f6a623">in</text>
  <!-- calibrate -->
  <rect x="760" y="376" width="108" height="28" rx="9" fill="#f6a623"/>
  <text x="814" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1300">⚙ Calibrate</text>
  <!-- lock -->
  <rect x="876" y="376" width="30" height="28" rx="8" fill="#161e40" stroke="#2a335e"/>
  <text x="891" y="395" text-anchor="middle" font-size="14" fill="#e7ecff">🔓</text>
</svg>
